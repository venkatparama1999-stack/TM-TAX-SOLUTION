<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM GST Consultation</title>

<style>
body {margin:0; font-family:Arial; background:#f4f6f9;}
header {background:#0d6efd; color:white; padding:20px; text-align:center;}
.hero {
    background:linear-gradient(to right,#0d6efd,#198754);
    color:white; padding:40px; text-align:center;
}
button {
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
}
.call {background:white; color:#0d6efd;}
.whatsapp {background:#25D366; color:white;}

.services {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    padding:20px;
}
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    flex:1;
    min-width:200px;
    text-align:center;
}

.form-box {
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, button {
    width:100%;
    margin-top:10px;
    padding:10px;
}
button {background:#198754; color:white;}

footer {
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1>TM GST Consultation</h1>
<p>Your Tax Partner</p>
</header>

<div class="hero">
<h2>GST Filing Made Easy</h2>
<p>GSTR-1 | GSTR-2B | GSTR-3B</p>

<button class="call" onclick="window.location.href='tel:9345699700'">Call Now</button>
<button class="whatsapp" onclick="window.open('https://wa.me/919345699700')">WhatsApp</button>
</div>

<div class="services">
<div class="card"><h3>GSTR-1 Filing</h3></div>
<div class="card"><h3>GSTR-2B Check</h3></div>
<div class="card"><h3>GSTR-3B Filing</h3></div>
</div>

<div class="form-box">
<h3>Select Service</h3>

<form onsubmit="sendToWhatsApp(); return false;">
<label><input type="checkbox" value="GSTR-1"> GSTR-1</label><br>
<label><input type="checkbox" value="GSTR-2B"> GSTR-2B</label><br>
<label><input type="checkbox" value="GSTR-3B"> GSTR-3B</label><br>

<input type="text" id="name" placeholder="Your Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>

<button type="submit">Send Request</button>
</form>
</div>

<footer>
📞 9345699700 | TM GST Consultation
</footer>

<script>
function sendToWhatsApp() {
let services = [];
document.querySelectorAll('input[type=checkbox]:checked')
.forEach(el => services.push(el.value));

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

let message = "GST Request:%0AName: " + name +
"%0APhone: " + phone +
"%0AServices: " + services.join(", ");

window.open("https://wa.me/919345699700?text=" + message);
}
</script>

</body>
</html>
